name: Cron — Sync

# Gmail から Vietcombank 取引メールを取得して transactions に同期する。
# GH Actions cron が本番URLの /api/cron/sync を叩く。
# 旧: vercel.json の crons (GH Actions に一元化)
#
# 必要な GitHub Secrets:
#   CRON_SECRET route.ts で検証する Bearer トークン (Vercel 側で未設定なら省略可)
# 本番 URL は公開情報なので直書き。

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'  # ICT (UTC+7) 02:00 daily / JST 04:00

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        run: |
          curl --fail-with-body -sS -L \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://piggy-bank-hcmc.vercel.app/api/cron/sync"
